<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>업무 자동화 컨설팅 서비스</title>
  </head>
  <body>
    <div id="app" class="app">
      <!-- 상단 네비게이션 -->
      <header class="nav">
        <div class="nav__inner">
          <a class="brand" href="#" id="brand-link">
            <span class="brand__mark" aria-hidden="true">
              <svg viewBox="0 0 32 32" width="26" height="26">
                <defs>
                  <linearGradient id="bm" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#7c5cff" />
                    <stop offset="1" stop-color="#4f46e5" />
                  </linearGradient>
                </defs>
                <rect x="3" y="3" width="26" height="26" rx="8" fill="url(#bm)" />
                <path d="M11 16.5l3.2 3.2L21.5 12" fill="none" stroke="#fff"
                  stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span class="brand__name">업무 자동화 컨설팅 서비스</span>
          </a>

          <nav class="nav__actions" aria-label="주요 메뉴">
            <button type="button" id="home-btn" class="nav__btn">홈</button>
            <button type="button" id="sheet-btn" class="nav__btn nav__btn--ghost">
              원본 시트
              <span class="nav__ext" aria-hidden="true">↗</span>
            </button>
          </nav>
        </div>
      </header>

      <!-- 풀폭 콘텐츠 -->
      <main class="page">
        <div class="page__inner">
          <!-- 본문: HOME(히어로+입력 폼) 또는 선택한 프로젝트의 태스크 -->
          <div id="content-body" aria-live="polite"></div>

          <!-- 등록된 프로젝트 둘러보기 (HOME 에서만 노출) -->
          <section id="browse" class="browse" aria-label="등록된 프로젝트">
            <div class="browse__head">
              <h2 class="browse__title">등록된 프로젝트</h2>
              <p class="browse__subtitle">카테고리를 눌러 프로젝트를 펼치고, 프로젝트를 선택하면 태스크가 표시됩니다.</p>
            </div>
            <nav id="menu" class="menu" aria-label="카테고리 메뉴">
              <div class="state" id="state">데이터를 불러오는 중…</div>
            </nav>
          </section>

          <!-- 태스크 화면 하단: 자동화 컨설팅 (프로젝트 선택 시에만 노출) -->
          <footer class="consult">
            <button type="button" id="btn-consult" class="consult__btn consult__btn--primary">
              자동화 컨설팅 받기
            </button>
            <button type="button" id="btn-consult-test" class="consult__btn consult__btn--test">
              컨설팅 미리보기(테스트)
            </button>
          </footer>

          <!-- 프로젝트별 컨설팅 내역 -->
          <section id="history" class="history" aria-label="컨설팅 내역"></section>
        </div>
      </main>

      <footer class="site-foot">
        <div class="site-foot__inner">
          <span class="site-foot__brand">업무 자동화 컨설팅 서비스</span>
          <span class="site-foot__note">스프레드시트 기반 · AI 자동화 제안</span>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
